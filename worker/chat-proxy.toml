name = "chat-proxy"
main = "chat-proxy.js"
compatibility_date = "2024-10-01"

# デプロイ前の設定:
#   1) wrangler login
#   2) wrangler secret put ANTHROPIC_API_KEY --config chat-proxy.toml
#      → sk-ant-api03-... を入力
#   3) wrangler kv namespace create CHAT_QUOTA
#      → 出力された id を下の kv_namespaces セクションに記入
#   4) wrangler deploy --config chat-proxy.toml
#
# ローカル開発:
#   wrangler dev --config chat-proxy.toml

[[kv_namespaces]]
binding = "CHAT_QUOTA"
id = "34c78b34c2bd45d7aa5e397a8aa6f749"

# カスタムドメイン: chat.minatech1210.com
# 初回 wrangler deploy 時にCloudflareがDNS CNAMEとSSL証明書を自動設定
[[routes]]
pattern = "chat.minatech1210.com"
custom_domain = true
