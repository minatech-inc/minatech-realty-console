<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#dbc291"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005bac"/>
      <stop offset="100%" stop-color="#00a0e9"/>
    </linearGradient>
  </defs>
  <!-- アイコン: 家+虫眼鏡のモチーフ -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#navyGrad)"/>
  <!-- 家の屋根 -->
  <polygon points="32,14 16,28 48,28" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 家の本体 -->
  <rect x="20" y="28" width="24" height="18" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- ドア -->
  <rect x="28" y="34" width="8" height="12" rx="1" fill="url(#goldGrad)" opacity="0.6"/>
  <!-- 虫眼鏡 -->
  <circle cx="44" cy="42" r="7" fill="none" stroke="#fff" stroke-width="2"/>
  <line x1="49" y1="47" x2="54" y2="52" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- チェックマーク（解析完了の象徴） -->
  <polyline points="40,41 43,44 48,38" fill="none" stroke="#c9a96e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- テキスト: REINS Analyzer -->
  <text x="72" y="30" font-family="'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="20" font-weight="800" fill="#005bac" letter-spacing="0.5">REINS</text>
  <text x="145" y="30" font-family="'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="20" font-weight="400" fill="#04384c" letter-spacing="0.5">Analyzer</text>
  <!-- サブテキスト -->
  <text x="72" y="48" font-family="'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="11" fill="#6c7a89" letter-spacing="1">by MinaTech</text>
  <text x="140" y="48" font-family="'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif" font-size="9" fill="#c9a96e" letter-spacing="0.5">宅建業者向け物件評価</text>
</svg>
