<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>物件概要書フッター（標準帯）ソース</title>
<!--
  マイソク帯替え機能の「標準帯」生成用ソース。
  会社情報が変わったらこのHTMLを修正し、tests/lib/obi_shot.js で obi-footer.png を再生成する。
-->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; }
  .band {
    width: 1684px; height: 284px;
    background: #fff;
    border: 1px solid #dde3ec;
    border-top: 7px solid #1e3a5f;
    display: flex;
    align-items: stretch;
    color: #1f2a3d;
  }
  /* ===== 左: ブランド ===== */
  .brand {
    width: 27%;
    padding: 20px 10px 16px 34px;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    border-right: 1px solid #e7ebf2;
  }
  .brand img { height: 74px; width: auto; align-self: center; margin-bottom: 6px; }
  .brand .company { font-family: 'Noto Serif JP', serif; font-size: 27px; font-weight: 700; color: #1e3a5f; letter-spacing: 0.02em; }
  .brand .company-en { font-size: 11.5px; letter-spacing: 0.32em; color: #8a94a6; margin-top: 3px; }
  .brand .divider { width: 100%; height: 1px; background: #e7ebf2; margin: 12px 0 10px; }
  .brand .lic-label { font-size: 11px; letter-spacing: 0.18em; color: #8a94a6; }
  .brand .lic { font-size: 16.5px; font-weight: 500; color: #1f2a3d; margin-top: 3px; }
  /* ===== 中央: 連絡先 ===== */
  .info {
    flex: 1;
    padding: 22px 28px 18px 40px;
    display: grid;
    grid-template-columns: 92px 1fr;
    align-content: space-between;
    row-gap: 6px;
    border-right: 1px solid #e7ebf2;
  }
  .label { font-size: 12px; letter-spacing: 0.22em; color: #8a94a6; align-self: center; }
  .label.top { align-self: start; padding-top: 4px; }
  .val { font-size: 17px; color: #1f2a3d; }
  .addr { line-height: 1.5; }
  .tel-row { display: flex; align-items: baseline; gap: 12px; }
  .tel { font-size: 32px; font-weight: 700; color: #1e3a5f; letter-spacing: 0.01em; }
  .sep { color: #c3cad6; font-size: 18px; }
  .fax { font-size: 16px; color: #6b7688; }
  /* ===== 右: 取引態様・担当者・QR ===== */
  .right {
    width: 27.5%;
    padding: 18px 24px 16px 22px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .panel-head {
    background: #edf1f7; border: 1px solid #dde3ec; border-bottom: none;
    font-size: 12.5px; font-weight: 600; color: #1e3a5f; letter-spacing: 0.14em;
    padding: 5px 10px;
    display: flex; align-items: center; gap: 7px;
  }
  .panel-head::before { content: ''; width: 9px; height: 9px; background: #1e3a5f; border-radius: 2px; }
  .torihiki-body {
    border: 1px solid #dde3ec;
    padding: 9px 10px;
    display: flex; gap: 16px; align-items: center;
    font-size: 15px; color: #1f2a3d;
  }
  .cb { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .cb .box { width: 15px; height: 15px; border: 1.6px solid #8a94a6; border-radius: 2px; }
  .lower { display: flex; gap: 12px; flex: 1; }
  .tanto { flex: 1; display: flex; flex-direction: column; }
  .tanto-body { border: 1px solid #dde3ec; flex: 1; min-height: 62px; }
  .qr {
    width: 86px; height: 86px; align-self: flex-end;
    border: 1.6px dashed #c3cad6; border-radius: 2px;
    display: flex; align-items: flex-start; justify-content: flex-start;
    font-size: 11px; color: #c3cad6; padding: 4px 6px; letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="band" id="band">
  <div class="brand">
    <img src="logo.svg" alt="Shonan Minato">
    <div class="company">MinaTech株式会社</div>
    <div class="company-en">SHONAN MINATO REAL ESTATE</div>
    <div class="divider"></div>
    <div class="lic-label">宅地建物取引業免許</div>
    <div class="lic">神奈川県知事免許（1）第32624号</div>
  </div>
  <div class="info">
    <div class="label top">所在地</div>
    <div class="val addr">〒251-0055<br>神奈川県藤沢市南藤沢3-12</div>
    <div class="label">TEL／FAX</div>
    <div class="tel-row"><span class="tel">0466-96-0313</span><span class="sep">／</span><span class="fax">FAX 0466-96-0313</span></div>
    <div class="label">営業時間</div>
    <div class="val">10:00 – 19:00　<span class="sep">／</span>　定休日 水曜日</div>
    <div class="label">WEB</div>
    <div class="val">realestate.minatech1210.com</div>
    <div class="label">MAIL</div>
    <div class="val">info@minatech1210.com</div>
  </div>
  <div class="right">
    <div>
      <div class="panel-head">取引態様</div>
      <div class="torihiki-body">
        <span class="cb"><span class="box"></span>売主</span>
        <span class="cb"><span class="box"></span>代理</span>
        <span class="cb"><span class="box"></span>専任媒介</span>
        <span class="cb"><span class="box"></span>一般媒介</span>
      </div>
    </div>
    <div class="lower">
      <div class="tanto">
        <div class="panel-head">担当者</div>
        <div class="tanto-body"></div>
      </div>
      <div class="qr">QR</div>
    </div>
  </div>
</div>
</body>
</html>
